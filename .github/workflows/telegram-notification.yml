name: 📝 Sensor Log
on:
  repository_dispatch:
    types: [sensor-alert]
jobs:
  log-sensor-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Log Data Sensor
        run: |
          echo "================================="
          echo "  📡 DATA SENSOR DITERIMA"
          echo "================================="
          echo "Status  : ${{ github.event.client_payload.status }}"
          echo "Lokasi  : ${{ github.event.client_payload.location }}"
          echo "Waktu   : ${{ github.event.client_payload.timestamp }}"
          echo "Deteksi : ${{ github.event.client_payload.count }}"
          echo "================================="
